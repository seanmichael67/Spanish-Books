<!DOCTYPE html>
<html lang="es">
<head>
    <meta charset="UTF-8">
    <title>¡Vamos al Espacio!</title>
    <style>
        body { font-family: 'Arial', sans-serif; text-align: center; background: #0b0e14; color: white; }
        .page { height: 90vh; display: flex; flex-direction: column; justify-content: center; align-items: center; }
        img { max-width: 80%; height: auto; border-radius: 10px; }
        h1 { font-size: 3em; }
    </style>
</head>
<body>
    <div class="page"><h1>¡Vamos al Espacio!</h1></div>
    <div class="page"><p>Yo miro el cielo.</p></div>
    <div class="page"><p>Veo la luna blanca.</p></div>
    <div class="page"><p>Veo las estrellas brillantes.</p></div>
    <div class="page"><p>¡Miro un cohete rojo!</p></div>
    <div class="page"><p>El cohete vuela lejos.</p></div>
    <div class="page"><p>Veo un planeta azul.</p></div>
    <div class="page"><p>¡Hola, planeta!</p></div>
    <div class="page"><p>El cohete vuelve a casa.</p></div>
    <div class="page"><p>Estoy feliz en el espacio.</p></div>
    <div class="page"><p>¡Buenas noches, estrellas!</p></div>
</body>
</html>
