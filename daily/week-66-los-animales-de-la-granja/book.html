<!DOCTYPE html>
<html>
<head><title>Un Día en la Granja</title></head>
<body>
  <div class="page" id="page1">
    <h1>¡Hola! Vamos a la granja.</h1>
    <img src="page1.jpg" alt="Farm gate">
  </div>
  <div class="page" id="page2">
    <h1>La vaca dice: "Muu, muu".</h1>
    <img src="page2.jpg" alt="Cow">
  </div>
  <div class="page" id="page3">
    <h1>El caballo dice: "¡Iii, iii!".</h1>
    <img src="page3.jpg" alt="Horse">
  </div>
  <div class="page" id="page4">
    <h1>El cerdito dice: "Oink, oink".</h1>
    <img src="page4.jpg" alt="Pig">
  </div>
  <div class="page" id="page5">
    <h1>La oveja dice: "Bee, bee".</h1>
    <img src="page5.jpg" alt="Sheep">
  </div>
  <div class="page" id="page6">
    <h1>El pato dice: "Cuac, cuac".</h1>
    <img src="page6.jpg" alt="Duck">
  </div>
  <div class="page" id="page7">
    <h1>La gallina dice: "Co, co, co".</h1>
    <img src="page7.jpg" alt="Chicken">
  </div>
  <div class="page" id="page8">
    <h1>¡Buenas noches, amigos!</h1>
    <img src="page8.jpg" alt="Sleeping animals">
  </div>
</body>
</html>
